apiVersion: apps/v1
kind: Deployment
metadata:
  name: throttle-gate
  namespace: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: throttle-gate
  template:
    metadata:
      labels:
        app: throttle-gate
    spec:
      containers:
        - name: gateway
          image: throttle-gate:latest
          ports:
            - containerPort: 8080
            - containerPort: 9464
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: throttle-gate-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: throttle-gate-secrets
                  key: jwt-secret
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: throttle-gate
  namespace: api-gateway
spec:
  selector:
    app: throttle-gate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9464
      targetPort: 9464
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: throttle-gate-hpa
  namespace: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: throttle-gate
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: throttle-gate-pdb
  namespace: api-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: throttle-gate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: throttle-gate-config
  namespace: api-gateway
data:
  NODE_ENV: "production"
  PORT: "8080"
  METRICS_PORT: "9464"
